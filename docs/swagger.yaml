basePath: /
definitions:
  gorm.DeletedAt:
    properties:
      time:
        type: string
      valid:
        description: Valid is true if Time is not NULL
        type: boolean
    type: object
  pkg.AdditionalRecipeSteps:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      recipeId:
        type: integer
      stepId:
        type: integer
      technicalSheetId:
        type: integer
      updatedAt:
        type: string
    type: object
  pkg.BakeTiming:
    properties:
      duration:
        type: integer
      temperature:
        $ref: '#/definitions/pkg.Temperature'
      unit:
        type: string
    type: object
  pkg.Ingredient:
    properties:
      allergen:
        type: string
      category:
        type: string
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      details:
        type: string
      energy:
        type: number
      id:
        type: integer
      name:
        type: string
      ref:
        type: string
      supplier:
        type: string
      unit:
        type: string
      unitPrice:
        type: number
      updatedAt:
        type: string
    type: object
  pkg.Mold:
    properties:
      capacity:
        type: number
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      name:
        type: string
      shape:
        type: string
      updatedAt:
        type: string
    type: object
  pkg.Portion:
    properties:
      quantity:
        type: integer
      type:
        $ref: '#/definitions/pkg.Type'
    type: object
  pkg.Recipe:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      equipements:
        items:
          type: string
        type: array
      id:
        type: integer
      imageUrl:
        type: string
      name:
        type: string
      recipeIngredients:
        items:
          $ref: '#/definitions/pkg.RecipeIngredient'
        type: array
      steps:
        items:
          $ref: '#/definitions/pkg.Step'
        type: array
      timings:
        $ref: '#/definitions/pkg.Timings'
      updatedAt:
        type: string
    type: object
  pkg.RecipeIngredient:
    properties:
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      ingredient:
        $ref: '#/definitions/pkg.Ingredient'
      ingredientId:
        type: integer
      quantity:
        type: number
      recipeId:
        type: integer
      updatedAt:
        type: string
    type: object
  pkg.Step:
    properties:
      actionDetail:
        type: string
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      id:
        type: integer
      recipeId:
        type: integer
      technicalSheetId:
        type: integer
      updatedAt:
        type: string
      verb:
        $ref: '#/definitions/pkg.Verb'
      videoUrl:
        type: string
    type: object
  pkg.TechnicalSheet:
    properties:
      additionalRecipeSteps:
        items:
          $ref: '#/definitions/pkg.AdditionalRecipeSteps'
        type: array
      conservation:
        type: string
      createdAt:
        type: string
      deletedAt:
        $ref: '#/definitions/gorm.DeletedAt'
      description:
        type: string
      finishingSteps:
        items:
          $ref: '#/definitions/pkg.Step'
        type: array
      id:
        type: integer
      imageUrl:
        type: string
      mold:
        $ref: '#/definitions/pkg.Mold'
      moldId:
        type: integer
      name:
        type: string
      recipes:
        items:
          $ref: '#/definitions/pkg.Recipe'
        type: array
      updatedAt:
        type: string
      yield:
        $ref: '#/definitions/pkg.Yield'
    type: object
  pkg.Temperature:
    properties:
      unit:
        type: string
      value:
        type: integer
    type: object
  pkg.Timing:
    properties:
      description:
        type: string
      duration:
        type: integer
      unit:
        type: string
    type: object
  pkg.Timings:
    properties:
      baking:
        $ref: '#/definitions/pkg.BakeTiming'
      cooking:
        $ref: '#/definitions/pkg.Timing'
      preparation:
        $ref: '#/definitions/pkg.Timing'
      resting:
        $ref: '#/definitions/pkg.Timing'
      totalTime:
        type: integer
    type: object
  pkg.Type:
    enum:
    - Part
    - Ramequin
    type: string
    x-enum-varnames:
    - TypeSlice
    - TypeRamequin
  pkg.Verb:
    enum:
    - Couper
    - Melanger
    - Cuire
    - Amalgamer
    - Monter
    type: string
    x-enum-varnames:
    - VerbChop
    - VerbMix
    - VerbBake
    - VerbBoil
    - VerbFry
  pkg.Yield:
    properties:
      portion:
        $ref: '#/definitions/pkg.Portion'
      servings:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: REST API for managing ingredients, recipes and technical sheets.
  title: TechSheets API
  version: "1.0"
paths:
  /ingredient:
    post:
      consumes:
      - application/json
      parameters:
      - description: Ingredient to create
        in: body
        name: ingredient
        required: true
        schema:
          $ref: '#/definitions/pkg.Ingredient'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Ingredient'
      summary: Create ingredient
      tags:
      - ingredients
  /ingredient/{id}:
    delete:
      parameters:
      - description: Ingredient ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "304":
          description: Not Modified
      summary: Delete ingredient by ID
      tags:
      - ingredients
    get:
      parameters:
      - description: Ingredient ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Ingredient'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Get ingredient by ID
      tags:
      - ingredients
    patch:
      consumes:
      - application/json
      parameters:
      - description: Ingredient ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated ingredient
        in: body
        name: ingredient
        required: true
        schema:
          $ref: '#/definitions/pkg.Ingredient'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Ingredient'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Update ingredient by ID
      tags:
      - ingredients
  /ingredients:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg.Ingredient'
            type: array
      summary: List all ingredients
      tags:
      - ingredients
  /ingredients/upload:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Excel file (.xlsx)
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              type: string
            type: array
      summary: Bulk import ingredients from Excel file
      tags:
      - ingredients
  /recipe:
    post:
      consumes:
      - application/json
      parameters:
      - description: Recipe to create
        in: body
        name: recipe
        required: true
        schema:
          $ref: '#/definitions/pkg.Recipe'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Recipe'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Create recipe
      tags:
      - recipes
  /recipe/{id}:
    delete:
      parameters:
      - description: Recipe ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Delete recipe by ID
      tags:
      - recipes
    get:
      parameters:
      - description: Recipe ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Recipe'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get recipe by ID
      tags:
      - recipes
    patch:
      consumes:
      - application/json
      parameters:
      - description: Recipe ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated recipe
        in: body
        name: recipe
        required: true
        schema:
          $ref: '#/definitions/pkg.Recipe'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.Recipe'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Update recipe by ID
      tags:
      - recipes
  /recipes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg.Recipe'
            type: array
      summary: List all recipes
      tags:
      - recipes
  /technicalsheet:
    post:
      consumes:
      - application/json
      parameters:
      - description: Technical sheet to create
        in: body
        name: sheet
        required: true
        schema:
          $ref: '#/definitions/pkg.TechnicalSheet'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.TechnicalSheet'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Create technical sheet
      tags:
      - technical-sheets
  /technicalsheet/{id}:
    delete:
      parameters:
      - description: Technical sheet ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Delete technical sheet by ID
      tags:
      - technical-sheets
    get:
      parameters:
      - description: Technical sheet ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.TechnicalSheet'
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get technical sheet by ID
      tags:
      - technical-sheets
    patch:
      consumes:
      - application/json
      parameters:
      - description: Technical sheet ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated technical sheet
        in: body
        name: sheet
        required: true
        schema:
          $ref: '#/definitions/pkg.TechnicalSheet'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/pkg.TechnicalSheet'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Update technical sheet by ID
      tags:
      - technical-sheets
  /technicalsheets:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/pkg.TechnicalSheet'
            type: array
      summary: List all technical sheets
      tags:
      - technical-sheets
  /upload/image:
    post:
      consumes:
      - multipart/form-data
      parameters:
      - description: Image file
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Upload an image
      tags:
      - uploads
swagger: "2.0"
